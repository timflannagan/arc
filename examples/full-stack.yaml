# full-stack.yaml
#
# A single file defining an agent and all its dependencies.
# Apply with: arc apply -f full-stack.yaml
#
# Resources are applied in document order, so define dependencies first:
#   1. MCP servers and skills the agent references
#   2. Prompts the agent uses
#   3. The agent itself
---
apiVersion: ar.dev/v1alpha1
kind: MCPServer
metadata:
  name: acme/fetch
  version: "1.0.0"
spec:
  title: Fetch Server
  description: "Fetches and extracts content from URLs"
  status: active
  packages:
    - registryType: oci
      identifier: ghcr.io/acme/fetch:1.0.0
      version: "1.0.0"
      runTimeHint: python
      transport:
        type: stdio
---
apiVersion: ar.dev/v1alpha1
kind: Skill
metadata:
  name: acme/summarize
  version: "1.0.0"
spec:
  title: Summarization
  category: nlp
  description: "Summarizes long text into concise form"
  status: active
---
apiVersion: ar.dev/v1alpha1
kind: Prompt
metadata:
  name: acme/system-prompt
  version: "1.0.0"
spec:
  description: "Default system prompt for summarization agents"
  content: |
    You are a document summarization assistant.
    Keep summaries concise and accurate.
---
apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: acme/summarizer
  version: "1.0.0"
spec:
  image: ghcr.io/acme/summarizer:v1.0
  language: python
  framework: adk
  modelProvider: Gemini
  modelName: gemini-2.0-flash
  description: "An agent that summarizes documents using Gemini"
  status: active
  mcpServers:
    - type: registry
      name: fetch
      registryURL: http://localhost:12121
      registryServerName: acme/fetch
      registryServerVersion: "1.0"
  skills:
    - name: summarize
      registryURL: http://localhost:12121
      registrySkillName: acme/summarize
      registrySkillVersion: "1.0"
  prompts:
    - name: system-prompt
      registryURL: http://localhost:12121
      registryPromptName: acme/system-prompt
      registryPromptVersion: "1.0"
